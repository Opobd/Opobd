<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার অনলাইন ক্লাস</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #000; }
        .header { background: #333; color: white; padding: 10px; text-align: center; }
        .nav-bar { background: #444; display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .video-container { flex-grow: 1; position: relative; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h2>নবম শ্রেণির অনলাইন পাঠশালা</h2>
</div>

<div class="nav-bar">
    <!-- প্লেলিস্ট বাটন -->
    <button onclick="changeVideo('https://www.youtube.com/embed/videoseries?list=PLsSreV-WvVndkK5yOq9uA8D0-wHwXvR1E')">সাধারণ গণিত</button>
    
    <!-- আপনার দেওয়া নির্দিষ্ট ভিডিওর বাটন -->
    <button onclick="changeVideo('https://www.youtube.com/embed/aOLYCV8hrQw')">বিশেষ ভিডিও</button>
</div>

<div class="video-container">
    <iframe id="videoPlayer" src="https://www.youtube.com/embed/videoseries?list=PLsSreV-WvVndkK5yOq9uA8D0-wHwXvR1E" allowfullscreen></iframe>
</div>

<script>
    function changeVideo(url) {
        document.getElementById('videoPlayer').src = url;
    }
</script>

</body>
</html>
